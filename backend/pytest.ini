[pytest]
asyncio_mode = auto
testpaths = tests
pythonpath = .
addopts =
    --cov=app
    --cov-report=term
    --cov-report=xml:coverage.xml
    --cov-fail-under=70
    -v
    -m "not e2e"
filterwarnings =
    ignore::DeprecationWarning
markers =
    e2e: End-to-end tests that hit real akshare data (slow, skipped in CI unit test jobs)
