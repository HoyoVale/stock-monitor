name: Feature Request
description: 建议新功能或改进
title: "[Feature]: "
labels: ["feature"]
body:
  - type: textarea
    attributes:
      label: 问题背景
      description: 这个功能解决什么问题？为什么需要它？
    validations:
      required: true
  - type: textarea
    attributes:
      label: 建议方案
      description: 描述你期望的功能或改进
    validations:
      required: true
  - type: textarea
    attributes:
      label: 替代方案
      description: 是否考虑过其他实现方式？
  - type: textarea
    attributes:
      label: 附加信息
      description: 截图、参考链接等
