name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'release/v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            V="${GITHUB_REF#refs/tags/v}"
            echo "trigger=tag" >> $GITHUB_OUTPUT
          else
            V="${GITHUB_REF#refs/heads/release/v}"
            echo "trigger=branch" >> $GITHUB_OUTPUT
          fi
          echo "version=$V" >> $GITHUB_OUTPUT

      - name: Create git tag
        if: steps.ver.outputs.trigger == 'branch'
        run: |
          git config user.name "Release Bot"
          git config user.email "release@github.com"
          git tag -a "v${{ steps.ver.outputs.version }}" -m "v${{ steps.ver.outputs.version }}"
          git push origin "v${{ steps.ver.outputs.version }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Generate release body
        run: |
          V="${{ steps.ver.outputs.version }}"
          echo "# stock-monitor v${V}" > release.md
          echo "" >> release.md
          echo "## 快速开始" >> release.md
          echo '```bash' >> release.md
          echo "docker run -d -p 8000:8000 ghcr.io/${{ github.repository_owner }}/stock-monitor-backend:v${V}" >> release.md
          echo "docker run -d -p 80:80 ghcr.io/${{ github.repository_owner }}/stock-monitor-frontend:v${V}" >> release.md
          echo '```' >> release.md
          echo "" >> release.md
          echo "📖 完整使用说明见 [用户手册](https://github.com/${{ github.repository }}/blob/master/docs/USER_GUIDE.md)" >> release.md
          echo "" >> release.md
          echo "## 更新日志" >> release.md
          echo "" >> release.md
          sed -n '/^## \['"$V"'\]/,/^## \[/p' CHANGELOG.md | sed '1d;$d' >> release.md 2>/dev/null || echo "- v${V}" >> release.md
          cat release.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.ver.outputs.version }}
          body_path: release.md
          generate_release_notes: true
          files: frontend/dist/**/*

      - name: Report failure to repo
        if: failure()
        run: |
          mkdir -p .github/failure-reports
          echo "Release ${{ steps.ver.outputs.version }} failed at $(date -u)" > .github/failure-reports/release-v${{ steps.ver.outputs.version }}.md
          echo "Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> .github/failure-reports/release-v${{ steps.ver.outputs.version }}.md
          git add .github/failure-reports/ && git commit -m "ci: failure report" && git push origin "${{ github.ref_name }}" || true

      - name: Create failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Release workflow 失败',
              body: `Release v${{ steps.ver.outputs.version }} 失败。\n\n- 日志: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug', 'release-failure', 'P0']
            });
