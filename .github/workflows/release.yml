name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'release/v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            V="${GITHUB_REF#refs/tags/v}"
            echo "trigger=tag" >> $GITHUB_OUTPUT
          else
            V="${GITHUB_REF#refs/heads/release/v}"
            echo "trigger=branch" >> $GITHUB_OUTPUT
          fi
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "Version=$V Trigger=${{ steps.ver.outputs.trigger }}"

      - name: Create git tag (branch trigger)
        if: steps.ver.outputs.trigger == 'branch'
        run: |
          git config user.name "Release Bot"
          git config user.email "release@github.com"
          git tag -a "v${{ steps.ver.outputs.version }}" -m "Release v${{ steps.ver.outputs.version }}"
          git push origin "v${{ steps.ver.outputs.version }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: |
          cd frontend && npm ci && npm run build

      - name: Extract changelog
        run: |
          awk "/^## [${{ steps.ver.outputs.version }}]/,/^## /" CHANGELOG.md | tail -n +2 | head -n -1 > release-body.md
          [ -s release-body.md ] || echo "v${{ steps.ver.outputs.version }}" > release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.ver.outputs.version }}
          body_path: release-body.md
          generate_release_notes: true
