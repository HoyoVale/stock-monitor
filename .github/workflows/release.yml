name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'release/v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            V="${GITHUB_REF#refs/tags/v}"
            echo "trigger=tag" >> $GITHUB_OUTPUT
          else
            V="${GITHUB_REF#refs/heads/release/v}"
            echo "trigger=branch" >> $GITHUB_OUTPUT
          fi
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "Extracted version: $V"

      - name: Create git tag
        if: steps.ver.outputs.trigger == 'branch'
        id: tag
        run: |
          git config user.name "Release Bot"
          git config user.email "release@github.com"
          git tag -a "v${{ steps.ver.outputs.version }}" -m "v${{ steps.ver.outputs.version }}"
          git push origin "v${{ steps.ver.outputs.version }}"
          echo "Tag v${{ steps.ver.outputs.version }} pushed"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Generate release body
        run: |
          V="${{ steps.ver.outputs.version }}"
          {
            echo "# stock-monitor v${V}"
            echo ""
            echo "## 快速开始"
            echo '```bash'
            echo "docker run -d -p 8000:8000 ghcr.io/${{ github.repository_owner }}/stock-monitor-backend:v${V}"
            echo "docker run -d -p 80:80 ghcr.io/${{ github.repository_owner }}/stock-monitor-frontend:v${V}"
            echo '```'
            echo ""
            echo "📖 完整使用说明见 [用户手册](https://github.com/${{ github.repository }}/blob/master/docs/USER_GUIDE.md)"
            echo ""
            echo "## 更新日志"
            echo ""
            grep -A 200 "^## \[${V}\]" CHANGELOG.md | sed '/^## \[0\..*\]/q' | head -n -1
          } > release.md
          cat release.md

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.ver.outputs.version }}
          body_path: release.md
          generate_release_notes: true
          files: frontend/dist/**/*

      - name: Commit failure report to repo
        if: failure()
        run: |
          mkdir -p .github/failure-reports
          echo "## Release workflow 失败" > .github/failure-reports/release-${{ steps.ver.outputs.version }}.md
          echo "" >> .github/failure-reports/release-${{ steps.ver.outputs.version }}.md
          echo "- 运行: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> .github/failure-reports/release-${{ steps.ver.outputs.version }}.md
          echo "- 分支: ${{ github.ref }}" >> .github/failure-reports/release-${{ steps.ver.outputs.version }}.md
          echo "- 时间: $(date -u)" >> .github/failure-reports/release-${{ steps.ver.outputs.version }}.md
          git add .github/failure-reports/
          git commit -m "ci: release workflow failure report" || true
          git push origin "${{ github.ref_name }}" || true

      - name: Create failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Release workflow 失败',
              body: `Release workflow 失败。\n\n- 日志: ${runUrl}\n- 分支: ${context.ref}\n`, 
              labels: ['bug', 'release-failure', 'P0']
            });
