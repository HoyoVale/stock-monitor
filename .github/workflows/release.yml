name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'release/v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            V="${GITHUB_REF#refs/tags/v}"
            echo "trigger=tag" >> $GITHUB_OUTPUT
          else
            V="${GITHUB_REF#refs/heads/release/v}"
            echo "trigger=branch" >> $GITHUB_OUTPUT
          fi
          echo "version=$V" >> $GITHUB_OUTPUT

      - name: Create git tag
        if: steps.ver.outputs.trigger == 'branch'
        run: |
          git config user.name "Release Bot"
          git config user.email "release@github.com"
          git tag -a "v${{ steps.ver.outputs.version }}" -m "Release v${{ steps.ver.outputs.version }}"
          git push origin "v${{ steps.ver.outputs.version }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@53851d14592bedcffcf25ea515637cff71ef929a

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59eab27c4a0111fb48b48

      - name: Login to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@ca052bb54ab079caa0e449726fb9abf243874ab3
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/stock-monitor-backend:latest
            ghcr.io/${{ github.repository_owner }}/stock-monitor-backend:v${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@ca052bb54ab079caa0e449726fb9abf243874ab3
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/stock-monitor-frontend:latest
            ghcr.io/${{ github.repository_owner }}/stock-monitor-frontend:v${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Node.js
        uses: actions/setup-node@1a047faa6befd5ef37cff5cd18bcc5f08f28d051
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Extract changelog
        id: changelog
        run: |
          awk "/^## \[${{ steps.ver.outputs.version }}\]/,/^## \[/" CHANGELOG.md | tail -n +2 | head -n -1 > release-body.md
          echo -e "\n---\n\n🐳 Docker 快速启动:\n\`\`\`bash\ndocker run -d -p 8000:8000 ghcr.io/${{ github.repository_owner }}/stock-monitor-backend:v${{ steps.ver.outputs.version }}\ndocker run -d -p 80:80 ghcr.io/${{ github.repository_owner }}/stock-monitor-frontend:v${{ steps.ver.outputs.version }}\n\`\`\`" >> release-body.md
          [ -s release-body.md ] || echo "v${{ steps.ver.outputs.version }} release" > release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c062c08b532815e1b8c5411926e6e3d56e3ab0e1
        with:
          name: v${{ steps.ver.outputs.version }}
          body_path: release-body.md
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
          generate_release_notes: true
          files: |
            frontend/dist/**/*
