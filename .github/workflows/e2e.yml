name: E2E Smoke Test

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 2 * * *'  # 每天凌晨2点
  workflow_dispatch:  # 手动触发

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx pytest-cov

      - name: Run E2E smoke tests
        id: e2e
        run: |
          cd backend
          pytest tests/e2e/ -v --tb=long || echo "e2e_failed=true" >> $GITHUB_OUTPUT

      - name: Create issue on failure
        if: steps.e2e.outputs.e2e_failed == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c379ccdee
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'e2e-failure',
              state: 'open'
            });
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'E2E 烟雾测试失败',
                body: '⚠️ 每日 E2E 测试失败。数据源 (akshare) 可能不可用或 API 变更。请检查最新的 CI 运行日志。',
                labels: ['bug', 'e2e-failure', 'P0']
              });
            }
