name: CI

on:
  push:
    branches: [master, develop]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'VERSION'
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest-cov mypy

      - name: Lint with ruff (strict)
        run: |
          pip install ruff
          ruff check backend/ --exit-non-zero --output-format=github

      - name: Type check with mypy
        run: |
          cd backend && mypy app/ --config-file mypy.ini

      - name: Run tests with coverage
        run: |
          cd backend && pytest tests/ -v --tb=short

      - name: Upload coverage to GitHub
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: coverage-py
          path: backend/coverage.xml

  frontend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@1a047faa6befd5ef37cff5cd18bcc5f08f28d051
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint (eslint + prettier)
        run: |
          cd frontend
          npx eslint src/ --max-warnings 0
          npx prettier --check "src/**/*.{ts,vue,css}"

      - name: Run unit tests
        run: cd frontend && npm test

      - name: Type check
        run: cd frontend && npx vue-tsc -b --noEmit

      - name: Build
        run: cd frontend && npm run build
