name: CI

on:
  push:
    branches: [master, develop]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'VERSION'
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest-cov mypy ruff
      - name: Lint (ruff)
        run: ruff check backend/ --exit-non-zero --output-format=github
      - name: Type check (mypy)
        run: cd backend && mypy app/ --config-file mypy.ini
      - name: Test with coverage
        run: cd backend && pytest tests/ -v --tb=short -m "not e2e"
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py
          path: backend/coverage.xml

  frontend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - name: Install deps
        run: cd frontend && (npm ci 2>/dev/null || npm install)
      - name: Lint (eslint + prettier)
        run: cd frontend && npx eslint src/ --max-warnings 0 && npx prettier --check "src/**/*.{ts,vue,css}"
      - name: Test
        run: cd frontend && npm test
      - name: Type check
        run: cd frontend && npx vue-tsc -b --noEmit
      - name: Build
        run: cd frontend && npm run build
